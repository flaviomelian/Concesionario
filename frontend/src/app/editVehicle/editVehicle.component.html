<div class="form-container">
  <h2>Editar Vehículo</h2>

  <form [formGroup]="vehicleForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Marca:</label>
      <input formControlName="make" type="text" value="Ej: Toyota" />
    </div>

    <div class="form-group">
      <label>Modelo:</label>
      <input formControlName="model" type="text" value ="Ej: Corolla" />
    </div>

    <div class="form-group">
      <label>Año:</label>
      <input formControlName="year" type="number" value=""/>
    </div>

    <div class="form-group">
      <label>Precio:</label>
      <input formControlName="price" type="number" value=""/>
    </div>

    <div class="form-group">
      <label>Imagen del Vehículo:</label>
      <input type="file" (change)="onFileSelected($event)" accept="image/*" class="file-input" />

      <input type="hidden" formControlName="image" />
    </div>

    <div class="form-group">
      <button type="submit" class="btn-primary">Editar Vehículo</button>
    </div>
  </form>
</div>
