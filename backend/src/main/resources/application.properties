# ==========================================
# CONFIGURACIÓN DE SERVIDOR Y APP
# ==========================================
spring.application.name=backend
server.port=${SERVER_PORT:8080}

# ==========================================
# CONEXIÓN A BASE DE DATOS
# ==========================================
# El formato depende de tu motor (MySQL en este ejemplo)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:concesionario}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# SEGURIDAD Y JWT
# ==========================================
# Estas variables deben estar obligatoriamente en tu .env
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# CORS (Para conectar con Angular)
# ==========================================
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}